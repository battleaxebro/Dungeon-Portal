  <ellipse cx="100" cy="92" rx="40" ry="42" fill="url(#iSkin)"/>
  <!-- Rosy cheeks -->
  <ellipse cx="74" cy="102" rx="11" ry="8" fill="#e09080" opacity="0.45"/>
  <ellipse cx="126" cy="102" rx="11" ry="8" fill="#e09080" opacity="0.45"/>
  <!-- Smooth lower face -->
  <path d="M72 108 Q100 126 128 108 L126 118 Q100 132 74 118 Z" fill="#c88858"/>
  <!-- Eyes (friendly) -->
  <ellipse cx="86" cy="86" rx="8" ry="8" fill="white"/>
  <ellipse cx="114" cy="86" rx="8" ry="8" fill="white"/>
  <circle cx="87" cy="87" r="5" fill="#5a3010"/>
  <circle cx="115" cy="87" r="5" fill="#5a3010"/>
  <circle cx="88" cy="86" r="2" fill="white"/>
  <circle cx="116" cy="86" r="2" fill="white"/>
  <!-- Hair -->
  <path d="M60 72 Q100 50 140 72 Q138 55 126 48 Q100 36 74 48 Q62 55 60 72" fill="#4a2a0a"/>
  <rect x="60" y="72" width="9" height="32" rx="5" fill="#4a2a0a"/>
  <rect x="131" y="72" width="9" height="32" rx="5" fill="#4a2a0a"/>
</svg>
