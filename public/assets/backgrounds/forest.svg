  <path d="M0 510 Q100 490 200 505 Q300 520 400 498" fill="none" stroke="#2a4a1a" stroke-width="3" opacity="0.5"/>
  <path d="M600 490 Q700 475 800 488 Q900 500 1000 482" fill="none" stroke="#2a4a1a" stroke-width="3" opacity="0.5"/>
