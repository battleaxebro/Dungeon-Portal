<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="fSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1a2a"/><stop offset="60%" stop-color="#1a3a2a"/><stop offset="100%" stop-color="#2a4a1a"/>
    </linearGradient>
    <linearGradient id="fGround" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a4a1a"/><stop offset="100%" stop-color="#1a2e0e"/>
    </linearGradient>
    <radialGradient id="fMoon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8f0c0"/><stop offset="100%" stop-color="#c0d080"/>
    </radialGradient>
    <radialGradient id="fGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#80c060" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#80c060" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Sky -->
  <rect width="1280" height="720" fill="url(#fSky)"/>
