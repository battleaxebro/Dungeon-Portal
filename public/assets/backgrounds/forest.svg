  <circle cx="120" cy="40" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="340" cy="25" r="1" fill="white" opacity="0.6"/>
  <circle cx="580" cy="55" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="820" cy="30" r="1" fill="white" opacity="0.5"/>
